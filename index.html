<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
  <title>Каталог одежды</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    :root {
      --bg: #f4f4f5;
      --card: #ffffff;
      --text: #1a1a1a;
      --hint: #8e8e93;
      --accent: #2481cc;
      --accent-text: #ffffff;
      --divider: #e5e5ea;
      --overlay: rgba(0,0,0,.45);
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,.08);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding-bottom: 80px;
    }

    /* ─── Header ─── */
    .header {
      position: sticky; top: 0; z-index: 90;
      background: var(--card);
      padding: 12px 16px 8px;
      box-shadow: 0 1px 0 var(--divider);
    }
    .header-row { display: flex; align-items: center; gap: 10px; }
    .search-box {
      flex: 1; display: flex; align-items: center; gap: 8px;
      background: var(--bg); border-radius: 10px; padding: 8px 12px;
    }
    .search-box svg { flex-shrink: 0; color: var(--hint); }
    .search-box input {
      flex: 1; border: none; background: none; outline: none;
      font-size: 15px; color: var(--text);
    }
    .search-box input::placeholder { color: var(--hint); }
    .cart-btn {
      position: relative; background: none; border: none; cursor: pointer;
      width: 44px; height: 44px; display: flex; align-items: center; justify-content: center;
      border-radius: 12px; transition: background .15s;
    }
    .cart-btn:active { background: var(--bg); }
    .cart-btn svg { color: var(--text); }
    .cart-badge {
      position: absolute; top: 2px; right: 2px;
      background: #ff3b30; color: #fff; font-size: 11px; font-weight: 700;
      min-width: 18px; height: 18px; border-radius: 9px;
      display: flex; align-items: center; justify-content: center;
      padding: 0 5px;
    }
    .cart-badge:empty, .cart-badge[data-count="0"] { display: none; }

    /* ─── Category chips ─── */
    .chips {
      display: flex; gap: 8px; padding: 10px 16px;
      overflow-x: auto; scrollbar-width: none;
    }
    .chips::-webkit-scrollbar { display: none; }
    .chip {
      flex-shrink: 0; padding: 7px 16px; border-radius: 20px;
      border: 1.5px solid var(--divider); background: var(--card);
      font-size: 13px; font-weight: 600; color: var(--hint);
      cursor: pointer; transition: all .2s; white-space: nowrap;
    }
    .chip.active {
      background: var(--accent); color: var(--accent-text);
      border-color: var(--accent);
    }

    /* ─── Product grid ─── */
    .grid {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 10px; padding: 10px 16px;
    }
    .card {
      background: var(--card); border-radius: var(--radius);
      overflow: hidden; box-shadow: var(--shadow); cursor: pointer;
      transition: transform .15s;
    }
    .card:active { transform: scale(.97); }
    .card-img {
      width: 100%; aspect-ratio: 3/4; object-fit: cover;
      background: var(--bg); display: block;
    }
    .card-placeholder {
      width: 100%; aspect-ratio: 3/4;
      background: linear-gradient(135deg, #e0e0e0, #c8c8cc);
      display: flex; align-items: center; justify-content: center;
      font-size: 48px; color: #fff;
    }
    .card-body { padding: 10px 12px 12px; }
    .card-name {
      font-size: 13px; font-weight: 600;
      line-height: 1.3; display: -webkit-box;
      -webkit-line-clamp: 2; -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .card-price {
      font-size: 15px; font-weight: 700; margin-top: 4px;
      color: var(--accent);
    }

    /* ─── Empty / loading ─── */
    .empty {
      text-align: center; padding: 60px 32px;
      color: var(--hint); font-size: 15px;
    }
    .empty-icon { font-size: 48px; margin-bottom: 12px; }
    .spinner {
      width: 32px; height: 32px; border: 3px solid var(--divider);
      border-top-color: var(--accent); border-radius: 50%;
      animation: spin .7s linear infinite; margin: 60px auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ─── Modal overlay ─── */
    .modal-overlay {
      position: fixed; inset: 0; z-index: 100;
      background: var(--overlay); opacity: 0;
      transition: opacity .25s; pointer-events: none;
    }
    .modal-overlay.open { opacity: 1; pointer-events: auto; }
    .modal {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 101;
      background: var(--card); border-radius: 20px 20px 0 0;
      max-height: 92vh; overflow-y: auto;
      transform: translateY(100%); transition: transform .3s ease;
    }
    .modal.open { transform: translateY(0); }
    .modal-handle {
      width: 36px; height: 4px; border-radius: 2px;
      background: var(--divider); margin: 10px auto;
    }

    /* ─── Product detail ─── */
    .detail-img {
      width: 100%; aspect-ratio: 3/4; object-fit: cover;
      background: var(--bg);
    }
    .detail-placeholder {
      width: 100%; aspect-ratio: 3/4;
      background: linear-gradient(135deg, #e0e0e0, #c8c8cc);
      display: flex; align-items: center; justify-content: center;
      font-size: 80px; color: #fff;
    }
    .detail-body { padding: 16px 20px 32px; }
    .detail-name { font-size: 20px; font-weight: 700; }
    .detail-price { font-size: 22px; font-weight: 800; color: var(--accent); margin-top: 6px; }
    .detail-desc { font-size: 14px; color: var(--hint); margin-top: 10px; line-height: 1.5; }
    .detail-section { margin-top: 16px; }
    .detail-label { font-size: 12px; font-weight: 700; color: var(--hint); text-transform: uppercase; margin-bottom: 8px; }
    .sizes { display: flex; flex-wrap: wrap; gap: 8px; }
    .size-btn {
      min-width: 48px; padding: 10px 16px; text-align: center;
      border: 2px solid var(--divider); border-radius: 10px;
      background: var(--card); font-size: 14px; font-weight: 600;
      color: var(--text); cursor: pointer; transition: all .15s;
    }
    .size-btn.active { border-color: var(--accent); background: var(--accent); color: var(--accent-text); }
    .add-btn {
      width: 100%; margin-top: 20px; padding: 16px;
      border: none; border-radius: 14px;
      background: var(--accent); color: var(--accent-text);
      font-size: 16px; font-weight: 700; cursor: pointer;
      transition: opacity .15s;
    }
    .add-btn:disabled { opacity: .4; cursor: default; }
    .add-btn:active:not(:disabled) { opacity: .8; }

    /* ─── Cart ─── */
    .cart-body { padding: 0 20px 32px; }
    .cart-title { font-size: 20px; font-weight: 700; padding: 16px 20px 8px; }
    .cart-item {
      display: flex; gap: 12px; padding: 12px 0;
      border-bottom: 1px solid var(--divider);
    }
    .cart-item-img {
      width: 64px; height: 80px; border-radius: 10px;
      object-fit: cover; flex-shrink: 0; background: var(--bg);
    }
    .cart-item-placeholder {
      width: 64px; height: 80px; border-radius: 10px;
      flex-shrink: 0; background: var(--bg);
      display: flex; align-items: center; justify-content: center;
      font-size: 28px;
    }
    .cart-item-info { flex: 1; display: flex; flex-direction: column; justify-content: center; }
    .cart-item-name { font-size: 14px; font-weight: 600; }
    .cart-item-size { font-size: 12px; color: var(--hint); }
    .cart-item-price { font-size: 14px; font-weight: 700; margin-top: 2px; }
    .cart-item-controls { display: flex; align-items: center; gap: 0; flex-shrink: 0; align-self: center; }
    .qty-btn {
      width: 32px; height: 32px; border: none; border-radius: 8px;
      background: var(--bg); font-size: 18px; font-weight: 700;
      color: var(--text); cursor: pointer; display: flex;
      align-items: center; justify-content: center;
    }
    .qty-btn:active { background: var(--divider); }
    .qty-val { width: 32px; text-align: center; font-size: 15px; font-weight: 600; }
    .cart-total {
      display: flex; justify-content: space-between; align-items: center;
      padding: 16px 0; margin-top: 8px; font-size: 18px; font-weight: 700;
    }
    .checkout-btn {
      width: 100%; padding: 16px; border: none; border-radius: 14px;
      background: var(--accent); color: var(--accent-text);
      font-size: 16px; font-weight: 700; cursor: pointer; margin-top: 8px;
    }
    .checkout-btn:active { opacity: .85; }

    /* ─── Checkout form ─── */
    .form-group { margin-bottom: 14px; }
    .form-group label {
      display: block; font-size: 12px; font-weight: 700;
      color: var(--hint); text-transform: uppercase; margin-bottom: 6px;
    }
    .form-group input, .form-group textarea {
      width: 100%; padding: 12px; border-radius: 10px;
      border: 1.5px solid var(--divider); background: var(--bg);
      font-size: 15px; color: var(--text); outline: none;
    }
    .form-group input:focus, .form-group textarea:focus { border-color: var(--accent); }

    /* ─── Floating cart bar ─── */
    .float-cart {
      position: fixed; bottom: 16px; left: 16px; right: 16px; z-index: 80;
      background: var(--accent); color: var(--accent-text);
      border-radius: 16px; padding: 14px 20px;
      display: flex; justify-content: space-between; align-items: center;
      font-size: 15px; font-weight: 700; cursor: pointer;
      box-shadow: 0 4px 20px rgba(0,0,0,.2);
      transform: translateY(120px); transition: transform .3s ease;
    }
    .float-cart.show { transform: translateY(0); }

    /* ─── Toast ─── */
    .toast {
      position: fixed; top: 16px; left: 50%; transform: translateX(-50%) translateY(-80px);
      background: #333; color: #fff; padding: 10px 20px;
      border-radius: 12px; font-size: 14px; font-weight: 600;
      z-index: 200; transition: transform .3s ease;
      white-space: nowrap;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }

    /* ─── Success screen ─── */
    .success { text-align: center; padding: 40px 20px; }
    .success-icon { font-size: 64px; margin-bottom: 16px; }
    .success h2 { font-size: 22px; margin-bottom: 8px; }
    .success p { color: var(--hint); font-size: 15px; margin-bottom: 24px; }
    .success-btn {
      padding: 14px 32px; border: none; border-radius: 14px;
      background: var(--accent); color: var(--accent-text);
      font-size: 15px; font-weight: 700; cursor: pointer;
    }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="header">
    <div class="header-row">
      <div class="search-box">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
        <input id="searchInput" type="text" placeholder="Поиск товаров...">
      </div>
      <button class="cart-btn" id="cartBtn">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z"/><path d="M3 6h18"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
        <span class="cart-badge" id="cartBadge"></span>
      </button>
    </div>
  </div>

  <!-- Categories -->
  <div class="chips" id="chips"></div>

  <!-- Product grid -->
  <div id="content"></div>

  <!-- Floating cart bar -->
  <div class="float-cart" id="floatCart">
    <span id="floatCartText">Корзина</span>
    <span>→</span>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <!-- Modal overlay -->
  <div class="modal-overlay" id="overlay"></div>

  <!-- Product detail modal -->
  <div class="modal" id="productModal">
    <div class="modal-handle"></div>
    <div id="productContent"></div>
  </div>

  <!-- Cart modal -->
  <div class="modal" id="cartModal">
    <div class="modal-handle"></div>
    <div id="cartContent"></div>
  </div>

<script>
const tg = window.Telegram?.WebApp;
if (tg) { tg.ready(); tg.expand(); }

const params = new URLSearchParams(location.search);
const API = (params.get('api') || '').replace(/\/$/, '');
let uid = tg?.initDataUnsafe?.user?.id || params.get('uid') || 0;

let categories = [];
let products = [];
let cart = [];
let selectedCat = null;
let searchTimeout = null;
let currentProduct = null;
let selectedSize = '';

// ─── Inline catalog data (loads instantly, no API needed) ────────────
const INLINE_CATEGORIES = [
  { id: 1, name: 'Футболки', emoji: '👕' },
  { id: 2, name: 'Худи и свитшоты', emoji: '🧥' },
  { id: 3, name: 'Джинсы и брюки', emoji: '👖' },
  { id: 4, name: 'Платья и юбки', emoji: '👗' },
  { id: 5, name: 'Аксессуары', emoji: '👜' },
];
const INLINE_PRODUCTS = [
  { id: 1, category_id: 1, name: 'Белая базовая футболка', description: 'Мягкий хлопок 100%, классический крой. Идеальная основа для любого образа.', price: 1290, sizes: 'S,M,L,XL', photo_url: 'photos/tshirt_white.jpg?v=3', has_photo: true },
  { id: 2, category_id: 1, name: 'Чёрная футболка oversize', description: 'Удлинённый крой, плотный трикотаж. Стильная повседневная классика.', price: 1590, sizes: 'S,M,L,XL,XXL', photo_url: 'photos/tshirt_black.jpg?v=3', has_photo: true },
  { id: 3, category_id: 1, name: 'Футболка с принтом', description: 'Яркий дизайнерский принт, хлопок с эластаном. Не линяет после стирки.', price: 1890, sizes: 'S,M,L,XL', photo_url: 'photos/tshirt_print.jpg?v=3', has_photo: true },
  { id: 4, category_id: 2, name: 'Худи чёрное классик', description: 'Тёплое худи с капюшоном и карманом-кенгуру. Флис внутри.', price: 3490, sizes: 'S,M,L,XL,XXL', photo_url: 'photos/hoodie_black.jpg?v=3', has_photo: true },
  { id: 5, category_id: 2, name: 'Свитшот серый меланж', description: 'Мягкий свитшот без капюшона. Универсальный цвет на каждый день.', price: 2990, sizes: 'S,M,L,XL', photo_url: 'photos/sweatshirt_grey.jpg?v=3', has_photo: true },
  { id: 6, category_id: 2, name: 'Худи бежевое oversize', description: 'Оверсайз крой, утеплённое. Уютный вариант для прохладной погоды.', price: 3990, sizes: 'M,L,XL', photo_url: 'photos/hoodie_beige.jpg?v=3', has_photo: true },
  { id: 7, category_id: 3, name: 'Джинсы прямого кроя', description: 'Классические синие джинсы, плотный деним. Не вытягиваются.', price: 4590, sizes: '28,30,32,34,36', photo_url: 'photos/jeans_straight.jpg?v=3', has_photo: true },
  { id: 8, category_id: 3, name: 'Джинсы slim fit чёрные', description: 'Зауженный крой, эластичный деним. Современная посадка.', price: 4990, sizes: '28,30,32,34,36', photo_url: 'photos/jeans_black.jpg?v=3', has_photo: true },
  { id: 9, category_id: 3, name: 'Брюки карго хаки', description: 'Свободный крой с карманами. Прочная ткань для активного стиля.', price: 3990, sizes: 'S,M,L,XL', photo_url: 'photos/cargo_pants.jpg?v=3', has_photo: true },
  { id: 10, category_id: 4, name: 'Платье-миди льняное', description: 'Натуральный лён, свободный крой. Идеально на лето.', price: 4290, sizes: 'S,M,L', photo_url: 'photos/dress_midi.jpg?v=3', has_photo: true },
  { id: 11, category_id: 4, name: 'Платье макси чёрное', description: 'Элегантное длинное платье для особых случаев.', price: 5490, sizes: 'S,M,L,XL', photo_url: 'photos/dress_maxi.jpg?v=3', has_photo: true },
  { id: 12, category_id: 4, name: 'Юбка плиссе', description: 'Плиссированная юбка до колена, лёгкая ткань.', price: 2590, sizes: 'S,M,L', photo_url: 'photos/skirt_plisse.jpg?v=3', has_photo: true },
  { id: 13, category_id: 5, name: 'Кожаная сумка-шоппер', description: 'Вместительная сумка из натуральной кожи. Минималистичный дизайн.', price: 5990, sizes: '-', photo_url: 'photos/bag_shopper.jpg?v=3', has_photo: true },
  { id: 14, category_id: 5, name: 'Шерстяной шарф', description: 'Мягкий вязаный шарф, тёплый и уютный.', price: 1890, sizes: '-', photo_url: 'photos/scarf_wool.jpg?v=3', has_photo: true },
  { id: 15, category_id: 5, name: 'Кепка бейсболка', description: 'Хлопковая кепка с регулировкой размера.', price: 990, sizes: '-', photo_url: 'photos/cap_baseball.jpg?v=3', has_photo: true },
];

// ─── Init ────────────────────────────────────────────────────────────
applyTheme();
categories = INLINE_CATEGORIES;
renderChips();
products = INLINE_PRODUCTS;
renderGrid();
if (uid) loadCart();

// ─── Theme ───────────────────────────────────────────────────────────
function applyTheme() {
  const r = document.documentElement.style;
  if (tg?.themeParams) {
    const t = tg.themeParams;
    if (t.bg_color) r.setProperty('--bg', t.secondary_bg_color || t.bg_color);
    if (t.bg_color) r.setProperty('--card', t.bg_color);
    if (t.text_color) r.setProperty('--text', t.text_color);
    if (t.hint_color) r.setProperty('--hint', t.hint_color);
    if (t.button_color) r.setProperty('--accent', t.button_color);
    if (t.button_text_color) r.setProperty('--accent-text', t.button_text_color);
  }
}

// ─── API calls ───────────────────────────────────────────────────────
async function api(path, opts) {
  const r = await fetch(API + path, opts);
  return r.json();
}

function loadProducts(catId, query) {
  let filtered = INLINE_PRODUCTS;
  if (catId) filtered = filtered.filter(p => p.category_id === catId);
  if (query) {
    const q = query.toLowerCase();
    filtered = filtered.filter(p => p.name.toLowerCase().includes(q) || (p.description || '').toLowerCase().includes(q));
  }
  products = filtered;
  renderGrid();
}

function loadProduct(id) {
  const p = INLINE_PRODUCTS.find(x => x.id === Number(id));
  if (p) { currentProduct = p; renderProductModal(); openModal('product'); }
}

async function loadCart() {
  if (!uid) return;
  const d = await api('/api/cart/' + uid);
  if (d.ok) { cart = d.items || []; updateCartUI(); }
}

async function apiCartAdd(productId, size) {
  if (!uid) return;
  await api('/api/cart/add', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ uid, product_id: productId, size }),
  });
  await loadCart();
  showToast('Добавлено в корзину');
  if (tg?.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
}

async function apiCartUpdate(itemId, qty) {
  await api('/api/cart/update', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ uid, item_id: itemId, quantity: qty }),
  });
  await loadCart();
  renderCartModal();
}

async function apiCartRemove(itemId) {
  await api('/api/cart/remove', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ uid, item_id: itemId }),
  });
  await loadCart();
  renderCartModal();
}

async function apiPlaceOrder(name, phone, address) {
  const d = await api('/api/order', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ uid, name, phone, address }),
  });
  if (d.ok) {
    cart = [];
    updateCartUI();
    renderOrderSuccess(d.order_id);
  }
}

// ─── Render: chips ───────────────────────────────────────────────────
function renderChips() {
  const el = document.getElementById('chips');
  let html = `<div class="chip${!selectedCat ? ' active' : ''}" data-cat="">Все</div>`;
  for (const c of categories) {
    html += `<div class="chip${selectedCat === c.id ? ' active' : ''}" data-cat="${c.id}">${c.emoji} ${esc(c.name)}</div>`;
  }
  el.innerHTML = html;
}

document.getElementById('chips').addEventListener('click', e => {
  const chip = e.target.closest('.chip');
  if (!chip) return;
  const catId = chip.dataset.cat ? Number(chip.dataset.cat) : null;
  selectedCat = catId;
  renderChips();
  loadProducts(catId, document.getElementById('searchInput').value.trim());
});

// ─── Render: product grid ────────────────────────────────────────────
function renderGrid() {
  const el = document.getElementById('content');
  if (products.length === 0) {
    el.innerHTML = '<div class="empty"><div class="empty-icon">🔍</div>Товары не найдены</div>';
    return;
  }
  let html = '<div class="grid">';
  for (const p of products) {
    const img = p.photo_url
      ? `<img class="card-img" src="${p.photo_url}" alt="" loading="lazy">`
      : `<div class="card-placeholder">👔</div>`;
    html += `<div class="card" data-id="${p.id}">${img}<div class="card-body"><div class="card-name">${esc(p.name)}</div><div class="card-price">${fmtPrice(p.price)} ₽</div></div></div>`;
  }
  html += '</div>';
  el.innerHTML = html;
}

document.getElementById('content').addEventListener('click', e => {
  const card = e.target.closest('.card');
  if (card) loadProduct(card.dataset.id);
});

// ─── Render: product modal ───────────────────────────────────────────
function renderProductModal() {
  const p = currentProduct;
  if (!p) return;
  selectedSize = '';
  const img = p.photo_url
    ? `<img class="detail-img" src="${p.photo_url}" alt="">`
    : `<div class="detail-placeholder">👔</div>`;

  const sizes = (p.sizes || '').split(',').map(s => s.trim()).filter(Boolean);
  let sizesHtml = '';
  if (sizes.length > 0) {
    sizesHtml = `<div class="detail-section"><div class="detail-label">Размер</div><div class="sizes">${sizes.map(s => `<div class="size-btn" data-size="${esc(s)}">${esc(s)}</div>`).join('')}</div></div>`;
  }

  document.getElementById('productContent').innerHTML =
    `${img}
    <div class="detail-body">
      <div class="detail-name">${esc(p.name)}</div>
      <div class="detail-price">${fmtPrice(p.price)} ₽</div>
      ${p.description ? `<div class="detail-desc">${esc(p.description)}</div>` : ''}
      ${sizesHtml}
      <button class="add-btn" id="addToCartBtn" ${sizes.length > 0 ? 'disabled' : ''}>${sizes.length > 0 ? 'Выберите размер' : '🛒 В корзину'}</button>
    </div>`;
}

document.getElementById('productModal').addEventListener('click', e => {
  const sizeBtn = e.target.closest('.size-btn');
  if (sizeBtn) {
    document.querySelectorAll('#productModal .size-btn').forEach(b => b.classList.remove('active'));
    sizeBtn.classList.add('active');
    selectedSize = sizeBtn.dataset.size;
    const btn = document.getElementById('addToCartBtn');
    btn.disabled = false;
    btn.textContent = '🛒 В корзину';
    if (tg?.HapticFeedback) tg.HapticFeedback.selectionChanged();
  }
  if (e.target.id === 'addToCartBtn' && !e.target.disabled && currentProduct) {
    const size = selectedSize || '-';
    apiCartAdd(currentProduct.id, size);
    closeModals();
  }
});

// ─── Render: cart modal ──────────────────────────────────────────────
function renderCartModal() {
  const el = document.getElementById('cartContent');
  if (cart.length === 0) {
    el.innerHTML = '<div class="cart-title">Корзина</div><div class="empty"><div class="empty-icon">🛒</div>Корзина пуста</div>';
    return;
  }
  let total = 0;
  let html = '<div class="cart-title">Корзина</div><div class="cart-body">';
  for (const it of cart) {
    const sub = it.price * it.quantity;
    total += sub;
    const img = it.photo_url
      ? `<img class="cart-item-img" src="${it.photo_url}" alt="">`
      : `<div class="cart-item-placeholder">👔</div>`;
    const sizeLabel = it.size && it.size !== '-' ? it.size : '';
    html += `<div class="cart-item">
      ${img}
      <div class="cart-item-info">
        <div class="cart-item-name">${esc(it.name)}</div>
        ${sizeLabel ? `<div class="cart-item-size">${esc(sizeLabel)}</div>` : ''}
        <div class="cart-item-price">${fmtPrice(sub)} ₽</div>
      </div>
      <div class="cart-item-controls">
        <button class="qty-btn" data-action="dec" data-item="${it.id}">−</button>
        <span class="qty-val">${it.quantity}</span>
        <button class="qty-btn" data-action="inc" data-item="${it.id}">+</button>
      </div>
    </div>`;
  }
  html += `<div class="cart-total"><span>Итого</span><span>${fmtPrice(total)} ₽</span></div>`;
  html += `<button class="checkout-btn" id="checkoutBtn">Оформить заказ</button>`;
  html += '</div>';
  el.innerHTML = html;
}

document.getElementById('cartContent').addEventListener('click', e => {
  const qtyBtn = e.target.closest('.qty-btn');
  if (qtyBtn) {
    const id = Number(qtyBtn.dataset.item);
    const action = qtyBtn.dataset.action;
    const item = cart.find(i => i.id === id);
    if (!item) return;
    if (action === 'inc') apiCartUpdate(id, item.quantity + 1);
    else if (action === 'dec') {
      if (item.quantity <= 1) apiCartRemove(id);
      else apiCartUpdate(id, item.quantity - 1);
    }
  }
  if (e.target.id === 'checkoutBtn') {
    renderCheckoutForm();
  }
});

// ─── Render: checkout form ───────────────────────────────────────────
function renderCheckoutForm() {
  const el = document.getElementById('cartContent');
  let total = 0;
  for (const it of cart) total += it.price * it.quantity;
  el.innerHTML = `
    <div class="cart-title">Оформление</div>
    <div class="cart-body">
      <div class="form-group"><label>Имя</label><input id="coName" placeholder="Ваше имя"></div>
      <div class="form-group"><label>Телефон</label><input id="coPhone" type="tel" placeholder="+7 (999) 123-45-67"></div>
      <div class="form-group"><label>Адрес доставки</label><input id="coAddr" placeholder="Город, улица, дом, кв."></div>
      <div class="cart-total"><span>Итого</span><span>${fmtPrice(total)} ₽</span></div>
      <button class="checkout-btn" id="placeOrderBtn">Подтвердить заказ</button>
    </div>`;
}

document.getElementById('cartContent').addEventListener('click', e => {
  if (e.target.id === 'placeOrderBtn') {
    const name = document.getElementById('coName').value.trim();
    const phone = document.getElementById('coPhone').value.trim();
    const addr = document.getElementById('coAddr').value.trim();
    if (!name || !phone) { showToast('Заполните имя и телефон'); return; }
    apiPlaceOrder(name, phone, addr);
  }
});

function renderOrderSuccess(orderId) {
  document.getElementById('cartContent').innerHTML = `
    <div class="success">
      <div class="success-icon">✅</div>
      <h2>Заказ оформлен!</h2>
      <p>Номер заказа: #${orderId}<br>Мы свяжемся с вами для подтверждения.</p>
      <button class="success-btn" onclick="closeModals()">Вернуться в каталог</button>
    </div>`;
}

// ─── Cart UI ─────────────────────────────────────────────────────────
function updateCartUI() {
  const count = cart.reduce((s, i) => s + i.quantity, 0);
  const total = cart.reduce((s, i) => s + i.price * i.quantity, 0);
  const badge = document.getElementById('cartBadge');
  badge.textContent = count || '';
  badge.dataset.count = count;
  const fb = document.getElementById('floatCart');
  fb.classList.toggle('show', count > 0);
  document.getElementById('floatCartText').textContent = `Корзина · ${fmtPrice(total)} ₽`;
}

// ─── Search ──────────────────────────────────────────────────────────
document.getElementById('searchInput').addEventListener('input', e => {
  clearTimeout(searchTimeout);
  searchTimeout = setTimeout(() => {
    loadProducts(selectedCat, e.target.value.trim());
  }, 350);
});

// ─── Modal management ────────────────────────────────────────────────
function openModal(type) {
  document.getElementById('overlay').classList.add('open');
  if (type === 'product') document.getElementById('productModal').classList.add('open');
  if (type === 'cart') {
    renderCartModal();
    document.getElementById('cartModal').classList.add('open');
  }
  document.body.style.overflow = 'hidden';
}

function closeModals() {
  document.getElementById('overlay').classList.remove('open');
  document.getElementById('productModal').classList.remove('open');
  document.getElementById('cartModal').classList.remove('open');
  document.body.style.overflow = '';
}

document.getElementById('overlay').addEventListener('click', closeModals);
document.getElementById('cartBtn').addEventListener('click', () => openModal('cart'));
document.getElementById('floatCart').addEventListener('click', () => openModal('cart'));

// Swipe-down to close modals
['productModal', 'cartModal'].forEach(id => {
  const el = document.getElementById(id);
  let startY = 0;
  el.addEventListener('touchstart', e => { startY = e.touches[0].clientY; }, { passive: true });
  el.addEventListener('touchend', e => {
    const dy = e.changedTouches[0].clientY - startY;
    if (dy > 80) closeModals();
  }, { passive: true });
});

// ─── Toast ───────────────────────────────────────────────────────────
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2000);
}

// ─── Helpers ─────────────────────────────────────────────────────────
function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
function fmtPrice(p) { return Number(p).toLocaleString('ru-RU'); }
</script>
</body>
</html>
